<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Micro-Academia · IA y Python para docentes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   MICRO-ACADEMIA · Demo navegable (datos solo durante la sesión)
   Paleta: indigo (marca), violeta (Unidad IA), verde (Unidad Python)
   ============================================================ */
:root{
  --ink:#1b1733; --ink-soft:#544f6e; --ink-faint:#8d88a3;
  --bg:#f5f5fb; --surface:#ffffff; --line:#e9e8f2; --line-2:#d8d6e8;
  --indigo:#5847eb; --indigo-soft:#eeebfe;
  --ia:#8b5cf6; --ia-soft:#f3edff;        /* Unidad Inteligencia Artificial */
  --py:#10b981; --py-soft:#e5f7f0;        /* Unidad Python */
  --amber:#f59e0b; --amber-soft:#fef3da;
  --ok:#22c55e; --ok-soft:#e7f8ed; --err:#ef4444; --err-soft:#fdeaea;
  --shadow:0 20px 50px -24px rgba(27,23,51,.4);
  --shadow-sm:0 4px 16px -8px rgba(27,23,51,.28);
  --r:18px;
}
:root[data-theme="dark"]{
  --ink:#ecebf7; --ink-soft:#a8a3c6; --ink-faint:#7b7699;
  --bg:#121020; --surface:#1c1930; --line:#2a2742; --line-2:#3a3556;
  --indigo:#7c6bff; --indigo-soft:#262150;
  --ia:#a78bfa; --ia-soft:#2c2350;
  --py:#34d399; --py-soft:#123329;
  --amber:#fbbf24; --amber-soft:#3a2e14;
  --ok:#34d399; --ok-soft:#143026; --err:#f87171; --err-soft:#3a1b1d;
  --shadow:0 20px 50px -24px rgba(0,0,0,.7);
  --shadow-sm:0 4px 16px -8px rgba(0,0,0,.55);
}
:root[data-theme="dark"] body{background:radial-gradient(900px 500px at 80% -10%, #1b1733 0%, transparent 60%), var(--bg)}
:root[data-theme="dark"] #login{background:var(--bg)}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg)}
h1,h2,h3,h4{font-family:'Plus Jakarta Sans',sans-serif;margin:0;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'JetBrains Mono',monospace}
.hidden{display:none!important}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px}

/* ---------- buttons ---------- */
.btn{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;border:none;
  border-radius:13px;padding:14px 22px;display:inline-flex;align-items:center;justify-content:center;
  gap:9px;transition:.16s}
.btn-primary{background:var(--indigo);color:#fff;box-shadow:0 10px 22px -10px rgba(88,71,235,.65)}
.btn-primary:hover{filter:brightness(1.07);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--line-2)}
.btn-ghost:hover{border-color:var(--indigo);color:var(--indigo)}
.btn-sm{padding:9px 15px;font-size:13.5px;border-radius:10px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:none}

/* ============================================================
   LOGIN
   ============================================================ */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;
  background:
    radial-gradient(900px 500px at 15% 10%, #ece9fe 0%, transparent 55%),
    radial-gradient(900px 600px at 90% 90%, #e3f6ef 0%, transparent 55%),
    var(--bg);z-index:40}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:26px;
  box-shadow:var(--shadow);width:100%;max-width:410px;padding:38px 34px;animation:pop .5s cubic-bezier(.22,1,.36,1)}
@keyframes pop{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.logo .mk{width:46px;height:46px;border-radius:14px;
  background:linear-gradient(135deg,var(--indigo),var(--ia));display:grid;place-items:center;
  box-shadow:0 8px 18px -8px rgba(88,71,235,.6)}
.logo .mk svg{width:26px;height:26px}
.logo b{font-family:'Plus Jakarta Sans';font-weight:800;font-size:19px;line-height:1}
.logo small{display:block;font-size:11px;color:var(--ink-faint);font-weight:500;margin-top:3px;
  letter-spacing:.03em;text-transform:uppercase}
.login-card h2{font-size:25px;margin-bottom:6px}
.login-card .lead{color:var(--ink-soft);font-size:14px;margin-bottom:24px;line-height:1.5}
.inp{margin-bottom:15px}
.inp label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px}
.inp input{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg);
  border:1.5px solid var(--line-2);border-radius:12px;padding:13px 15px;transition:.16s}
.inp input:focus{outline:none;border-color:var(--indigo);background:#fff;box-shadow:0 0 0 4px var(--indigo-soft)}
.demo-hint{display:flex;gap:9px;align-items:center;font-size:12px;color:var(--ink-faint);
  background:var(--bg);border:1px dashed var(--line-2);border-radius:11px;padding:11px 13px;margin-top:6px;line-height:1.4}

/* ============================================================
   LOADING
   ============================================================ */
#loading{position:fixed;inset:0;z-index:45;display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:26px;background:var(--bg);padding:20px;text-align:center}
#loading.show{display:flex}
.load-ring{width:64px;height:64px;border:5px solid var(--indigo-soft);border-top-color:var(--indigo);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading h2{font-size:24px}
#loadMsg{color:var(--ink-soft);font-size:14.5px;min-height:20px}
.load-bar{width:min(320px,80vw);height:8px;background:var(--line);border-radius:6px;overflow:hidden}
.load-bar>i{display:block;height:100%;width:0;border-radius:6px;
  background:linear-gradient(90deg,var(--indigo),var(--ia));transition:width .4s ease}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:none;min-height:100vh}
#app.show{display:grid;grid-template-columns:236px 1fr}
.sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--line);
  padding:22px 16px;display:flex;flex-direction:column;gap:6px}
.sidebar .logo{margin:6px 8px 22px}
.nav-item{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:13px;cursor:pointer;
  color:var(--ink-soft);font-weight:600;font-size:14.5px;transition:.15s;border:1.5px solid transparent}
.nav-item svg{width:21px;height:21px;flex-shrink:0}
.nav-item:hover{background:var(--bg)}
.nav-item.active{background:var(--indigo-soft);color:var(--indigo);border-color:#ded7fd}
.sidebar .spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:11px;padding:11px;border-radius:13px;background:var(--bg);margin-bottom:8px}
.avatar{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--indigo),var(--ia));
  color:#fff;display:grid;place-items:center;font-family:'Plus Jakarta Sans';font-weight:800;font-size:15px;flex-shrink:0}
.user-chip .who{min-width:0}
.user-chip .who b{display:block;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-chip .who small{font-size:11px;color:var(--ink-faint)}
.logout{display:flex;align-items:center;gap:9px;padding:11px 14px;border-radius:11px;color:var(--ink-faint);
  font-size:13px;font-weight:600;background:none;border:none;width:100%;transition:.15s}
.logout:hover{background:var(--err-soft);color:var(--err)}

.main{padding:34px 40px 60px;max-width:1080px}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.page-head .eyebrow{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--indigo);font-weight:700;margin-bottom:8px}
.page-head h1{font-size:30px;line-height:1.1}
.page-head p{color:var(--ink-soft);font-size:14.5px;margin-top:7px;max-width:560px;line-height:1.55}

/* generic card */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}

/* ---------- PROFILE ---------- */
.profile-hero{display:flex;gap:26px;align-items:center;padding:28px;flex-wrap:wrap}
.ring-wrap{position:relative;width:128px;height:128px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap .pct b{font-family:'Plus Jakarta Sans';font-weight:800;font-size:30px;line-height:1}
.ring-wrap .pct small{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.profile-hero .who h2{font-size:26px}
.profile-hero .who .tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;background:var(--bg);color:var(--ink-soft)}
.chip.level{background:var(--amber-soft);color:#b06f06}
.chip.ia{background:var(--ia-soft);color:#7c3aed}
.chip.py{background:var(--py-soft);color:#0a8f68}

.stat{padding:20px 22px}
.stat .lab{font-size:12.5px;color:var(--ink-faint);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.stat .lab svg{width:17px;height:17px}
.bar{height:9px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:4px}
.bar>i{display:block;height:100%;border-radius:6px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.exam-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.exam-row:last-child{border:none}
.exam-row .nm{display:flex;align-items:center;gap:10px;font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;background:var(--line-2)}
.dot.ia{background:var(--ia)} .dot.py{background:var(--py)}
.score-badge{font-family:'JetBrains Mono';font-weight:700;font-size:13px;padding:4px 11px;border-radius:8px;
  background:var(--bg);color:var(--ink-faint)}
.score-badge.pass{background:var(--ok-soft);color:#15803d}
.score-badge.mid{background:var(--amber-soft);color:#b06f06}

/* ---------- LEARNING ---------- */
.course-card{padding:22px;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
.course-card .topline{height:5px;border-radius:6px;width:46px}
.course-card h3{font-size:19px;display:flex;align-items:center;gap:10px}
.course-card .desc{color:var(--ink-soft);font-size:13.5px;line-height:1.5}
.unit-badge{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.unit-badge svg{width:19px;height:19px}
.sub-list{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.sub-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:13px;cursor:pointer;transition:.15s;background:var(--surface)}
.sub-item:hover{border-color:var(--line-2);transform:translateX(3px);box-shadow:var(--shadow-sm)}
.sub-item .ix{font-family:'JetBrains Mono';font-weight:700;font-size:12px;width:26px;height:26px;border-radius:8px;
  display:grid;place-items:center;flex-shrink:0;color:#fff}
.sub-item .t{flex:1;min-width:0}
.sub-item .t b{display:block;font-size:13.5px;font-weight:700}
.sub-item .t small{font-size:11.5px;color:var(--ink-faint)}
.mini-bar{width:54px;height:6px;background:var(--line);border-radius:4px;overflow:hidden;flex-shrink:0}
.mini-bar>i{display:block;height:100%;border-radius:4px;transition:width .5s}

.banner-test{padding:22px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  background:linear-gradient(120deg,var(--surface),var(--amber-soft));border:1px solid var(--line)}
.banner-test .ic{width:52px;height:52px;border-radius:14px;background:var(--amber);display:grid;place-items:center;flex-shrink:0}
.banner-test .ic svg{width:28px;height:28px}
.banner-test .tx{flex:1;min-width:200px}
.banner-test .tx h3{font-size:18px}
.banner-test .tx p{color:var(--ink-soft);font-size:13.5px;margin-top:4px}

.banner-final{padding:24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  background:linear-gradient(120deg,#211c43,#3a2f6b);color:#fff;border:none}
.banner-final .ic{width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.14);display:grid;place-items:center;flex-shrink:0}
.banner-final .tx{flex:1;min-width:200px}
.banner-final .tx h3{font-size:19px;color:#fff}
.banner-final .tx p{color:#cfc9ee;font-size:13.5px;margin-top:4px}

/* breadcrumb / back */
.crumb{display:inline-flex;align-items:center;gap:7px;color:var(--ink-faint);font-weight:600;font-size:13px;
  background:none;border:none;padding:6px 0;margin-bottom:16px}
.crumb:hover{color:var(--indigo)}

/* session list inside subunit */
.session{display:flex;align-items:center;gap:15px;padding:15px 18px;border:1.5px solid var(--line);
  border-radius:14px;margin-bottom:11px;cursor:pointer;transition:.15s;background:var(--surface)}
.session:hover{border-color:var(--indigo);box-shadow:var(--shadow-sm)}
.session .pi{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;flex-shrink:0}
.session .pi svg{width:21px;height:21px}
.session.done .pi{background:var(--ok-soft)}
.session .info{flex:1;min-width:0}
.session .info b{display:block;font-size:14.5px;font-weight:700}
.session .info small{font-size:12px;color:var(--ink-faint);font-family:'JetBrains Mono'}
.session .st{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:8px;background:var(--bg);color:var(--ink-faint)}
.session.done .st{background:var(--ok-soft);color:#15803d}

/* video player */
.player{padding:22px}
.video-frame{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#000;margin-bottom:18px;cursor:pointer}
.video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.vthumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vplay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.25);transition:.2s}
.video-frame:hover .vplay{background:rgba(0,0,0,.1)}
.vplay .pbtn{width:74px;height:74px;border-radius:50%;background:rgba(20,20,28,.72);display:grid;place-items:center;transition:.2s}
.video-frame:hover .vplay .pbtn{background:#ff0033;transform:scale(1.07)}
.vplay svg{width:30px;height:30px;margin-left:4px}
.yt-link{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--ink-faint);
  text-decoration:none;margin-top:2px}
.yt-link:hover{color:var(--err)}

/* ---------- QUIZ (Genially style) ---------- */
.quiz{max-width:680px;margin:0 auto}
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.quiz-dots{display:flex;gap:7px}
.quiz-dots i{width:10px;height:10px;border-radius:50%;background:var(--line-2);transition:.3s}
.quiz-dots i.on{background:var(--indigo);transform:scale(1.25)}
.quiz-dots i.ok{background:var(--ok)}
.quiz-count{font-family:'JetBrains Mono';font-size:13px;font-weight:700;color:var(--ink-faint)}
.q-card{background:var(--surface);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
  padding:34px;animation:slideIn .35s cubic-bezier(.22,1,.36,1)}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
.q-card .q-num{font-family:'JetBrains Mono';font-size:12px;color:var(--indigo);font-weight:700;letter-spacing:.08em;margin-bottom:12px}
.q-card h3{font-size:22px;line-height:1.3;margin-bottom:24px}
.opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--surface);
  border:2px solid var(--line);border-radius:15px;padding:16px 18px;margin-bottom:12px;font-size:15px;
  font-weight:600;color:var(--ink);transition:.18s}
.opt:hover:not(:disabled){border-color:var(--indigo);background:var(--indigo-soft);transform:translateX(4px)}
.opt .key{width:30px;height:30px;border-radius:9px;background:var(--bg);display:grid;place-items:center;
  font-family:'JetBrains Mono';font-weight:700;font-size:14px;flex-shrink:0;transition:.18s}
.opt.correct{border-color:var(--ok);background:var(--ok-soft);animation:bounce .4s}
.opt.correct .key{background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--err);background:var(--err-soft)}
.opt.wrong .key{background:var(--err);color:#fff}
@keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.03)}}
.q-feedback{margin-top:8px;padding:15px 17px;border-radius:13px;font-size:13.5px;line-height:1.5;
  display:none;animation:slideUp .3s ease}
.q-feedback.show{display:block}
.q-feedback.good{background:var(--ok-soft);color:#15803d}
.q-feedback.bad{background:var(--amber-soft);color:#9a6206}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.q-next{margin-top:18px;text-align:right;display:none}
.q-next.show{display:block}

/* quiz result */
.result{max-width:560px;margin:0 auto;text-align:center;animation:pop .5s}
.result .big-ring{width:170px;height:170px;margin:0 auto 22px;position:relative}
.result .big-ring svg{transform:rotate(-90deg)}
.result .big-ring .v{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result .big-ring .v b{font-family:'Plus Jakarta Sans';font-weight:800;font-size:44px;line-height:1}
.result .big-ring .v small{font-size:11px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase}
.result h2{font-size:28px;margin-bottom:8px}
.result p{color:var(--ink-soft);font-size:15px;margin-bottom:26px;line-height:1.5}
.result .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.confetti{position:fixed;width:11px;height:11px;top:-20px;z-index:60;pointer-events:none;border-radius:2px}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}

/* ---------- COMMUNITY ---------- */
.subtabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.subtab{padding:10px 18px;border-radius:11px;font-weight:700;font-size:14px;background:var(--surface);
  border:1.5px solid var(--line);color:var(--ink-soft);transition:.15s}
.subtab:hover{border-color:var(--line-2)}
.subtab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* assistant chat */
.chat{max-width:720px}
.chat-window{background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-sm);
  padding:22px;height:440px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:11px;max-width:84%}
.msg .ava{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center}
.msg.bot .ava{background:linear-gradient(135deg,var(--indigo),var(--ia))}
.msg.bot .ava svg{width:19px;height:19px}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg .bubble{padding:13px 16px;border-radius:15px;font-size:14px;line-height:1.55}
.msg.bot .bubble{background:var(--bg);border-bottom-left-radius:5px}
.msg.me .bubble{background:var(--indigo);color:#fff;border-bottom-right-radius:5px}
.msg.me .ava{background:var(--ink);color:#fff;font-family:'Plus Jakarta Sans';font-weight:800;font-size:13px}
.typing{display:flex;gap:4px;padding:15px 16px}
.typing i{width:8px;height:8px;border-radius:50%;background:var(--ink-faint);animation:tp 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s} .typing i:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.suggest{display:flex;gap:9px;flex-wrap:wrap;margin:14px 0}
.suggest button{font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:20px;background:var(--indigo-soft);
  color:var(--indigo);border:1px solid #ded7fd;transition:.15s}
.suggest button:hover{background:var(--indigo);color:#fff}
.chat-input{display:flex;gap:10px;margin-top:16px}
.chat-input input{flex:1;font-family:inherit;font-size:14.5px;border:1.5px solid var(--line-2);border-radius:13px;
  padding:13px 16px;background:var(--surface)}
.chat-input input:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 4px var(--indigo-soft)}

.thread .body{color:var(--ink-soft);font-size:13.5px;line-height:1.5}

.thread .meta span{display:flex;align-items:center;gap:5px}
.answers{margin-top:16px;padding-top:16px;border-top:1px solid var(--line);display:none}
.answers.show{display:block;animation:slideUp .3s}
.answer{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.answer:last-child{border:none}
.answer .ava{width:32px;height:32px;border-radius:9px;background:var(--bg);display:grid;place-items:center;

.answer .ct b{font-size:13px}
.answer .ct .best{font-size:10px;font-weight:700;color:#15803d;background:var(--ok-soft);padding:2px 8px;border-radius:6px;margin-left:7px}
.answer .ct p{font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin-top:4px}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

const $ = s => document.querySelector(s);
const main = () => $('#main');
function toast(msg, icon='✓'){
  const t=$('#toast'); t.innerHTML=`<span style="color:var(--py)">${icon}</span> ${msg}`;
  t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function initials(n){ return (n.trim()[0]||'D').toUpperCase(); }
function ringSVG(pct, color, size=128, sw=11){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      style="transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)"/></svg>`;
}
function watchedCount(){ return Object.keys(state.watched).filter(k=>state.watched[k]).length; }
function overallPct(){ return Math.round(watchedCount()/16*100); }

   ============================================================ */
function doLogin(){
  const u = $('#user').value.trim() || 'Docente';
  state.name = u.split(' ')[0];
  $('#login').classList.add('hidden');
  runLoading();
}
function runLoading(){
  const L=$('#loading'); L.classList.add('show');
  $('#loadTitle').textContent = `¡Hola, ${state.name}! 👋`;
  const steps=[
    {p:25,m:'Cargando tu ruta personalizada…'},
    {p:55,m:'Preparando microtalleres de IA y Python…'},
    {p:80,m:'Sincronizando tu progreso…'},
    {p:100,m:'¡Todo listo!'},
  ];
  let i=0;
  const tick=()=>{
    if(i<steps.length){ $('#loadBar').style.width=steps[i].p+'%'; $('#loadMsg').textContent=steps[i].m; i++; setTimeout(tick,600); }
    else { setTimeout(()=>{ L.classList.remove('show'); $('#app').classList.add('show'); syncChrome(); nav('perfil'); toast(`Bienvenido, ${state.name}`,'🎓'); },450); }
  };
  setTimeout(tick,300);
}
function logout(){
  // reinicia el estado de la sesión
  Object.assign(state,{name:'Docente',placementDone:false,placementLevel:null,placementScore:0,
    watched:{},examScores:{},finalScore:null,section:'perfil',community:'asistente'});
  $('#app').classList.remove('show');
  $('#user').value=''; $('#pass').value='';
  $('#login').classList.remove('hidden');
}
function syncChrome(){
  $('#navName').textContent = state.name;

}

let quiz=null;
function startQuiz(id, unitId, subId){
  const cfg=QUIZZES[id];
  quiz={id, cfg, i:0, score:0, answered:false, back:{unitId,subId}};
  renderQuestion();
}
function renderQuestion(){
  const {cfg,i}=quiz; const q=cfg.questions[i]; const total=cfg.questions.length;
  const dots=cfg.questions.map((_,k)=>`<i class="${k<i?'ok':(k===i?'on':'')}"></i>`).join('');
  const keys=['A','B','C','D'];
  main().innerHTML = `
    <div class="quiz">
      <button class="crumb" onclick="exitQuiz()">← Salir del ${cfg.title.toLowerCase().includes('test')?'test':'examen'}</button>
      <div class="quiz-top">
        <div class="quiz-dots">${dots}</div>
        <div class="quiz-count" style="color:${cfg.accent}">${i+1} / ${total}</div>
      </div>
      <div class="q-card">
        <div class="q-num" style="color:${cfg.accent}">${cfg.title}</div>
        <h3>${q.q}</h3>
        <div id="opts">
          ${q.o.map((o,k)=>`<button class="opt" data-k="${k}" onclick="answer(${k})">
            <span class="key">${keys[k]}</span>${o}</button>`).join('')}
        </div>
        <div class="q-feedback" id="qfb"></div>
        <div class="q-next" id="qnext">
          <button class="btn btn-primary" onclick="nextQuestion()">${i+1<total?'Siguiente →':'Ver resultado →'}</button>
        </div>
      </div>
    </div>`;
}
function answer(k){
  if(quiz.answered) return; quiz.answered=true;
  const q=quiz.cfg.questions[quiz.i];
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>{ o.disabled=true;
    const kk=+o.dataset.k;
    if(kk===q.c) o.classList.add('correct');
    if(kk===k && k!==q.c) o.classList.add('wrong');
  });
  const fb=$('#qfb');
  if(k===q.c){ quiz.score++; fb.className='q-feedback good show'; fb.innerHTML=`<b>¡Correcto!</b> ${q.e}`; }
  else { fb.className='q-feedback bad show'; fb.innerHTML=`<b>Casi.</b> ${q.e}`; }
  $('#qnext').classList.add('show');
}
function nextQuestion(){
  quiz.i++; quiz.answered=false;
  if(quiz.i<quiz.cfg.questions.length) renderQuestion();
  else finishQuiz();
}
function exitQuiz(){
  if(quiz.back && quiz.back.unitId) openSub(quiz.back.unitId, quiz.back.subId);
  else nav('aprendizaje');
}
function finishQuiz(){
  const {cfg,score}=quiz; const total=cfg.questions.length;
  const pct=Math.round(score/total*100);
  // guardar
  if(cfg.target==='placement'){
    state.placementDone=true; state.placementScore=score;
    state.placementLevel = score<=2?'Principiante':(score<=4?'Intermedio':'Avanzado');
  } else if(cfg.target==='final'){ state.finalScore=pct; }
  else { state.examScores[cfg.target]=pct; }

  const pass = pct>=70;
  if(pass) confetti();
  let title, msg;
  if(cfg.target==='placement'){ title=`Nivel: ${state.placementLevel}`; msg=`Acertaste ${score} de ${total}. Te recomendamos empezar por las sesiones marcadas para tu nivel.`; }
  else { title = pass?'¡Aprobado! 🎉':(pct>=50?'¡Casi! 💪':'A repasar 📘'); msg=`Obtuviste ${score} de ${total} respuestas correctas. Tu puntaje quedó guardado en tu perfil.`; }

  main().innerHTML = `
    <div class="result">
      <div class="big-ring">${ringSVG(pct, cfg.accent, 170, 13)}
        <div class="v"><b style="color:${cfg.accent}">${pct}</b><small>puntos</small></div></div>
      <h2>${title}</h2>
      <p>${msg}</p>
      <div class="actions">
        <button class="btn btn-ghost" onclick="startQuiz('${cfg.target==='placement'?'placement':(cfg.target==='final'?'final':cfg.target)}'${quiz.back&&quiz.back.unitId?`,'${quiz.back.unitId}','${quiz.back.subId}'`:''})">↻ Reintentar</button>
        <button class="btn btn-primary" onclick="${quiz.back&&quiz.back.unitId?`openSub('${quiz.back.unitId}','${quiz.back.subId}')`:`nav('perfil')`}">${quiz.back&&quiz.back.unitId?'Volver a la subunidad':'Ver mi perfil →'}</button>
      </div>
    </div>`;
}
function confetti(){
  const colors=['#5847eb','#8b5cf6','#10b981','#f59e0b','#22c55e'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animation=`fall ${1.6+Math.random()*1.6}s ${Math.random()*0.4}s ease-in forwards`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),3600);
  }
}

/* ============================================================
   SECCIÓN 3 · COMUNIDAD
   ============================================================ */
function renderComunidad(){
  main().innerHTML = `
    <div class="page-head"><div>
      <div class="eyebrow">Sección 3</div>
      <h1>Comunidad</h1>
      <p>Resuelve dudas al instante con el asistente, consulta el foro y acompáñate de otros docentes.</p>
    </div></div>
    <div class="subtabs">
      <button class="subtab ${state.community==='asistente'?'active':''}" onclick="setCommunity('asistente')">🤖 Asistente IA</button>
      <button class="subtab ${state.community==='foro'?'active':''}" onclick="setCommunity('foro')">💬 Foro de preguntas</button>
      <button class="subtab ${state.community==='feed'?'active':''}" onclick="setCommunity('feed')">👥 Comunidad</button>
    </div>
    <div id="commBody"></div>`;

}
function setCommunity(t){ state.community=t;
  document.querySelectorAll('.subtab').forEach(s=>s.classList.remove('active'));
  renderComunidad();
}
function renderCommunityBody(){
  if(state.community==='asistente') renderAssistant();
  if(state.community==='foro') renderForum();
  if(state.community==='feed') renderFeed();
}

/* ----- Asistente IA (respuestas preparadas) ----- */
let chatHistory=[];
let newQuestions=[]; // preguntas creadas por el usuario (solo durante la sesión)
function renderAssistant(){
  $('#commBody').innerHTML = `
    <div class="chat">
      <div class="chat-window" id="chatWin"></div>
      <div class="suggest" id="suggest">
        ${ASSISTANT_SUGGEST.map(s=>`<button onclick="askAssistant(this.textContent)">${s}</button>`).join('')}
      </div>
      <div class="chat-input">
        <input id="chatInput" placeholder="Escribe tu pregunta sobre IA o Python…" onkeydown="if(event.key==='Enter')askAssistant(this.value)">
        <button class="btn btn-primary btn-sm" onclick="askAssistant(document.getElementById('chatInput').value)">Enviar</button>
      </div>
    </div>`;
  if(chatHistory.length===0){
    chatHistory.push({who:'bot', text:`¡Hola, ${state.name}! Soy tu asistente de la Micro-Academia. Pregúntame lo que quieras sobre IA o Python aplicado a la docencia. 🤖`});
  }
  paintChat();
}
function paintChat(){
  const w=$('#chatWin'); if(!w) return;
  w.innerHTML = chatHistory.map(m=> m.who==='bot'
    ? `<div class="msg bot"><div class="ava"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="14" height="11" rx="2"/><path d="M9 8 V6 a3 3 0 0 1 6 0 v2"/><circle cx="9.5" cy="13" r="1" fill="#fff" stroke="none"/><circle cx="14.5" cy="13" r="1" fill="#fff" stroke="none"/></svg></div><div class="bubble">${m.text.replace(/\n/g,'<br>')}</div></div>`
    : `<div class="msg me"><div class="ava">${initials(state.name)}</div><div class="bubble">${m.text}</div></div>`
  ).join('');
  w.scrollTop=w.scrollHeight;
}
function askAssistant(text){
  text=(text||'').trim(); if(!text) return;
  const inp=$('#chatInput'); if(inp) inp.value='';
  chatHistory.push({who:'me', text}); paintChat();
  // typing indicator
  const w=$('#chatWin');
  const t=document.createElement('div'); t.className='msg bot'; t.id='typing';
  t.innerHTML=`<div class="ava"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="5" y="8" width="14" height="11" rx="2"/><path d="M9 8 V6 a3 3 0 0 1 6 0 v2"/></svg></div><div class="bubble" style="padding:0"><div class="typing"><i></i><i></i><i></i></div></div>`;
  w.appendChild(t); w.scrollTop=w.scrollHeight;
  setTimeout(()=>{
    const ans=matchAnswer(text);
    chatHistory.push({who:'bot', text:ans}); paintChat();
  }, 750+Math.random()*500);
}
function matchAnswer(text){
  const low=text.toLowerCase();
  for(const item of ASSISTANT_QA){ if(item.k.some(kw=>low.includes(kw))) return item.a; }
  return 'Buena pregunta. Te recomiendo revisar las sesiones de la Unidad correspondiente (IA o Python) — ahí lo explican paso a paso. ¿Quieres que te oriente sobre por dónde empezar según tu nivel?';
}

/* ----- Foro ----- */
function renderForum(){
  const ALL=[...newQuestions,...FORUM];
  $('#commBody').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">
      <p style="color:var(--ink-soft);font-size:14px;margin:0">Preguntas y respuestas de la comunidad docente.</p>
      <button class="btn btn-primary btn-sm" onclick="toggleNewQ()">+ Nueva pregunta</button>
    </div>

    <div class="card" id="newQForm" style="display:none;padding:20px;margin-bottom:16px">
      <h4 style="font-size:16px;margin-bottom:14px">Publicar una pregunta</h4>
      <div class="inp" style="margin-bottom:12px">
        <label>Título</label>
        <input id="nqTitle" type="text" placeholder="Escribe tu pregunta…" autocomplete="off">
      </div>
      <div class="inp" style="margin-bottom:12px">
        <label>Detalle (opcional)</label>
        <input id="nqBody" type="text" placeholder="Da más contexto…" autocomplete="off">
      </div>
      <div class="inp" style="margin-bottom:16px">
        <label>Categoría</label>
        <select id="nqTag" style="width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--bg);
          border:1.5px solid var(--line-2);border-radius:12px;padding:12px 14px">
          <option value="gen">General</option>
          <option value="ia">IA</option>
          <option value="py">Python</option>
        </select>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary btn-sm" onclick="submitQuestion()">Publicar</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleNewQ()">Cancelar</button>
      </div>
    </div>

    ${ALL.map((t,i)=>`
      <div class="card thread" onclick="toggleThread(${i})">
        <div class="th-top">
          <span class="tag ${t.tag}">${t.tagL}</span>
          <span style="font-size:12px;color:var(--ink-faint)">por ${t.author}</span>
          ${t.mine?'<span style="font-size:11px;color:var(--py);font-weight:700">· tú</span>':''}
        </div>
        <h4>${t.title}</h4>
        <div class="body">${t.body}</div>
        <div class="meta">
          <span>▲ ${t.votes} votos</span>
          <span>💬 ${t.ans.length} respuesta${t.ans.length===1?'':'s'}</span>
          <span style="color:var(--indigo);font-weight:600">Ver respuestas ↓</span>
        </div>
        <div class="answers" id="ans${i}">
          ${t.ans.length
            ? t.ans.map(a=>`<div class="answer">
                <div class="ava">${a.av}</div>
                <div class="ct"><b>${a.author}</b>${a.best?'<span class="best">✓ Mejor respuesta</span>':''}<p>${a.body}</p></div>
              </div>`).join('')
            : `<p style="color:var(--ink-faint);font-size:13px;padding:6px 0">Aún no hay respuestas. ¡Sé el primero en responder en la comunidad!</p>`}
        </div>
      </div>`).join('')}`;
}
function toggleNewQ(){
  const f=$('#newQForm'); if(!f) return;
  f.style.display = f.style.display==='none' ? 'block' : 'none';
  if(f.style.display==='block'){ const t=$('#nqTitle'); if(t) t.focus(); }
}
function submitQuestion(){
  const t=($('#nqTitle').value||'').trim();
  const b=($('#nqBody').value||'').trim();
  const tag=$('#nqTag').value;
  if(!t){ toast('Escribe un título para tu pregunta','✏️'); return; }
  const tagL={gen:'General', ia:'IA', py:'Python'}[tag];
  newQuestions.unshift({tag, tagL, author:state.name, av:initials(state.name),
    title:t, body:b||'(sin descripción adicional)', votes:0, ans:[], mine:true});
  toast('Pregunta publicada en el foro','💬');
  renderForum();
}
function toggleThread(i){ const a=$('#ans'+i); if(a) a.classList.toggle('show'); }

/* ----- Feed comunidad ----- */
function renderFeed(){
  $('#commBody').innerHTML = FEED.map(p=>`
    <div class="card post">
      <div class="ph">
        <div class="ava" style="background:${p.color}">${p.av}</div>
        <div><b>${p.author}</b><br><small>${p.when}</small></div>
      </div>
      <div class="ct">${p.body}</div>
      <div class="pa">
        <span onclick="toast('¡Te gusta esta publicación!','❤️')">❤️ ${p.likes}</span>
        <span onclick="toast('Comentarios disponibles en la versión final','💬')">💬 ${p.comments}</span>
        <span onclick="toast('Enlace copiado (demo)','🔗')">↗ Compartir</span>
      </div>
    </div>`).join('');
}
